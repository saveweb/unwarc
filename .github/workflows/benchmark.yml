name: Benchmark

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: benchmark-history
  cancel-in-progress: false

jobs:
  corpus:
    name: Corpus benchmark
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            backend: purego-linux
            benchmark-name: unwarc corpus benchmark purego linux
            go-test-tags: ''
            native: false
          - os: macos-latest
            backend: purego-macos
            benchmark-name: unwarc corpus benchmark purego macos
            go-test-tags: ''
            native: false
          - os: windows-latest
            backend: purego-windows
            benchmark-name: unwarc corpus benchmark purego windows
            go-test-tags: ''
            native: false
          - os: ubuntu-latest
            backend: native-linux
            benchmark-name: unwarc corpus benchmark native linux
            go-test-tags: unwarc_libz unwarc_libzstd
            native: true
          - os: macos-latest
            backend: native-macos
            benchmark-name: unwarc corpus benchmark native macos
            go-test-tags: unwarc_libz unwarc_libzstd
            native: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux native libraries
        if: matrix.native && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config zlib1g-dev libzstd-dev

      - name: Install macOS native libraries
        if: matrix.native && runner.os == 'macOS'
        run: |
          brew install pkg-config zlib zstd
          {
            echo "PKG_CONFIG_PATH=$(brew --prefix zlib)/lib/pkgconfig:$(brew --prefix zstd)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Run tests
        shell: bash
        env:
          GO_TEST_TAGS: ${{ matrix.go-test-tags }}
        run: |
          set -o pipefail
          tag_args=()
          if [ -n "$GO_TEST_TAGS" ]; then
            tag_args=(-tags "$GO_TEST_TAGS")
          fi
          go test "${tag_args[@]}" -count=1 ./...

      - name: Run corpus benchmark
        shell: bash
        env:
          GO_TEST_TAGS: ${{ matrix.go-test-tags }}
        run: |
          set -o pipefail
          tag_args=()
          if [ -n "$GO_TEST_TAGS" ]; then
            tag_args=(-tags "$GO_TEST_TAGS")
          fi
          go test "${tag_args[@]}" -run '^$' -bench '^BenchmarkCorpusWARC' -benchmem -count=5 . | tee benchmark.txt

      - name: Aggregate benchmark samples
        run: |
          go run ./internal/benchjson \
            -input benchmark.txt \
            -smaller benchmark-smaller.json \
            -bigger benchmark-bigger.json

      - name: Upload raw benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: corpus-benchmark-output-${{ matrix.backend }}
          path: |
            benchmark.txt
            benchmark-smaller.json
            benchmark-bigger.json

      - name: Compare latency and allocation results
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.benchmark-name }} latency and allocations
          tool: customSmallerIsBetter
          output-file-path: benchmark-smaller.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.backend }}/smaller
          summary-always: true
          alert-threshold: '150%'
          fail-threshold: '200%'
          fail-on-alert: true
          max-items-in-chart: 200

      - name: Compare throughput results
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.benchmark-name }} throughput
          tool: customBiggerIsBetter
          output-file-path: benchmark-bigger.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.backend }}/bigger
          summary-always: true
          alert-threshold: '150%'
          fail-threshold: '200%'
          fail-on-alert: true
          max-items-in-chart: 200

  corpus-clean-legacy-history:
    name: Remove legacy benchmark history
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: corpus
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout benchmark history
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove unaggregated benchmark charts
        shell: bash
        run: |
          for backend in purego-linux purego-macos purego-windows native-linux native-macos; do
            if [ -d "dev/bench/$backend" ]; then
              find "dev/bench/$backend" -maxdepth 1 -type f -delete
            fi
          done

      - name: Publish history cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add dev/bench
          git commit -m 'Remove unaggregated benchmark history'
          git push

  corpus-publish:
    name: Publish benchmark history
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - corpus
      - corpus-clean-legacy-history
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - backend: purego-linux
            benchmark-name: unwarc corpus benchmark purego linux
          - backend: purego-macos
            benchmark-name: unwarc corpus benchmark purego macos
          - backend: purego-windows
            benchmark-name: unwarc corpus benchmark purego windows
          - backend: native-linux
            benchmark-name: unwarc corpus benchmark native linux
          - backend: native-macos
            benchmark-name: unwarc corpus benchmark native macos
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download benchmark output
        uses: actions/download-artifact@v4
        with:
          name: corpus-benchmark-output-${{ matrix.backend }}
          path: benchmark-output

      - name: Store latency and allocation results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.benchmark-name }} latency and allocations
          tool: customSmallerIsBetter
          output-file-path: benchmark-output/benchmark-smaller.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.backend }}/smaller
          summary-always: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-threshold: '200%'
          fail-on-alert: true
          max-items-in-chart: 200

      - name: Store throughput results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.benchmark-name }} throughput
          tool: customBiggerIsBetter
          output-file-path: benchmark-output/benchmark-bigger.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/${{ matrix.backend }}/bigger
          summary-always: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-threshold: '200%'
          fail-on-alert: true
          max-items-in-chart: 200
